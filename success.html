<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You — Willard Tenant Association</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .thank-you {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .thank-you .checkmark {
      font-size: 3rem;
      margin-bottom: 1.5rem;
    }
    .thank-you h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 2.2rem;
      margin-bottom: 0.75rem;
      color: #1a1a1a;
    }
    .thank-you p {
      color: #777;
      font-size: 1rem;
      max-width: 400px;
      margin: 0 auto 2rem;
      line-height: 1.6;
    }
    .thank-you a {
      display: inline-block;
      background: #1a1a1a;
      color: #fff;
      padding: 0.85rem 2rem;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.95rem;
      transition: background 0.15s;
    }
    .thank-you a:hover {
      background: #333;
    }
  </style>
</head>
<body>
  <div class="thank-you">
    <div class="checkmark" aria-hidden="true">&#10003;</div>
    <h1>Thank You!</h1>
    <p>Your contribution helps keep the Willard community connected. Every dollar makes a difference.</p>
    <a href="https://wtassociation.org">Back to WTA Website</a>
  </div>
</body>
</html>
